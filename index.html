<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio DOM - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Tienda Lukas</span>
            <span class="badge bg-danger" id="badge"></span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5>Camiseta</h5>
                                <p>$35.000</p>
                                <button class="btn btn-primary btn-agregar" data-nombre="Camiseta" data-precio="35000">Agregar</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5>Blusa</h5>
                                <p>$40.000</p>
                                <button class="btn btn-primary btn-agregar" data-nombre="Blusa" data-precio="40000">Agregar</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5>Pantalón</h5>
                                <p>$65.000</p>
                                <button class="btn btn-primary btn-agregar" data-nombre="Pantalón" data-precio="65000">Agregar</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5>Maletín</h5>
                                <p>$47.000</p>
                                <button class="btn btn-primary btn-agregar" data-nombre="Maletín" data-precio="47000">Agregar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h4>Carrito</h4>
                    <ul id="lista-carrito" class="list-group mb-3"></ul>
                    <p id="msg-vacio">Tu carrito está vacío</p>
                    <div class="d-flex justify-content-between h5">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button id="btn-vaciar" class="btn btn-outline-danger mt-3">Vaciar Carrito</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
